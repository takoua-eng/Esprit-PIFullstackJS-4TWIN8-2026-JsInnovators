<div class="row">
  <div class="col-lg-6 m-auto">
    <mat-card class="cardWithShadow m-b-24">
      <mat-card-content class="p-32">
        <div class="d-flex align-items-center m-b-24">
          <img
            src="/assets/images/profile/user-1.jpg"
            alt="Super Admin"
            width="64"
            class="rounded-circle m-r-16"
          />
          <div>
            <div class="f-w-600 f-s-20">{{ superAdmin.name }}</div>
            <div class="f-s-14 text-muted">{{ superAdmin.role }} · {{ superAdmin.hospital }}</div>
          </div>
        </div>

        <div class="m-b-16">
          <div class="f-s-12 text-muted m-b-4">{{ 'EMAIL' | translate }}</div>
          <div class="f-s-14">{{ superAdmin.email }}</div>
        </div>

        <div class="m-b-16">
          <div class="f-s-12 text-muted m-b-4">{{ 'PHONE' | translate }}</div>
          <div class="f-s-14">{{ superAdmin.phone }}</div>
        </div>

        <div class="m-b-16">
          <div class="f-s-12 text-muted m-b-4">{{ 'SERVICE_UNIT' | translate }}</div>
          <div class="f-s-14">{{ superAdmin.service }}</div>
        </div>

        <div class="d-flex justify-content-end m-t-24">
          <button mat-stroked-button color="primary">{{ 'EDIT_PROFILE' | translate }}</button>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>

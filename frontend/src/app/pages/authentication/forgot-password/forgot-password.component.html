<div class="forgot-container">

  <div class="forgot-card">

    <!-- LEFT IMAGE -->
    <div class="left-side">
      <img src="assets/images/login.png" alt="illustration" />
    </div>

    <!-- RIGHT FORM -->
    <div class="right-side">

      <h2>Forgot your password?</h2>

      <p class="subtitle">
        Please enter the email address associated with your account and we will email you a link to reset your password.
      </p>

      <form [formGroup]="forgotForm" (ngSubmit)="submit()">

        <!-- Email Input -->
        <label>Email Address</label>
        <input
          type="email"
          formControlName="email"
          placeholder="admin@gmail.com"
          class="custom-input"
        />

        <!-- Submit Button -->
        <button type="submit" class="primary-btn" [disabled]="forgotForm.invalid || isLoading">
          {{ isLoading ? 'Sending...' : 'Forgot Password' }}
        </button>

        <!-- Back Button -->
        <button
          type="button"
          routerLink="/authentication/login"
          class="outline-btn"
        >
          Back to Login
        </button>

      </form>

      <!-- Message Feedback -->
      <p *ngIf="message" class="feedback-message">{{ message }}</p>

    </div>

  </div>

</div>

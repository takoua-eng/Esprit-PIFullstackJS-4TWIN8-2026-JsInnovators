<div class="login-wrapper">

  <mat-card class="login-card">

    <div class="login-grid">

      <!-- LEFT SIDE -->
      <div class="login-image">
        <img src="assets/images/login.png" alt="login-image" />
      </div>

      <!-- RIGHT SIDE -->
      <div class="login-form">

        <h2 class="title">Welcome to MediFollow</h2>
        <p class="subtitle">Your health monitoring dashboard</p>

        <div *ngIf="errorMessage" class="login-error" role="alert">
          {{ errorMessage }}
        </div>

        <!-- SOCIAL LOGIN -->
        <div class="social-login">
          <button mat-stroked-button type="button" class="social-btn" disabled>
            <mat-icon>login</mat-icon>
            Google
          </button>
        </div>

        <div class="divider">or sign in with</div>

        <!-- 🧠 FACE LOGIN BUTTON -->
        <button mat-stroked-button color="accent" class="face-btn" (click)="startFaceLogin()">

          📷 Login with Face ID
        </button>

        <!-- 🎥 CAMERA -->
        <div *ngIf="showCamera" class="camera-container">
          <video #video autoplay playsinline width="320" height="240" *ngIf="useVideo"></video>
          <img #image *ngIf="!useVideo" src="assets/test/test-face.jpg" width="320" height="240" />
          <button (click)="startTestFace()">Test Face</button>
          <div>{{ faceMessage }}</div>
        </div>



        <!-- 🧾 MESSAGE -->
        <div class="face-message" *ngIf="faceMessage">
          {{ faceMessage }}
        </div>

        <!-- LOADING -->
        <mat-spinner *ngIf="loadingFace" diameter="30"></mat-spinner>

        <div class="divider">or sign in with email</div>

        <!-- FORM -->
        <form [formGroup]="form" (ngSubmit)="submit()">

          <!-- EMAIL -->
          <mat-form-field appearance="outline" class="full">
            <mat-label>Email</mat-label>
            <input matInput type="email" formControlName="email" placeholder="Enter your email">

            <mat-error *ngIf="form.get('email')?.hasError('required')">
              Email is required
            </mat-error>

            <mat-error *ngIf="form.get('email')?.hasError('email')">
              Invalid email format
            </mat-error>
          </mat-form-field>

          <!-- PASSWORD -->
          <mat-form-field appearance="outline" class="full">
            <mat-label>Password</mat-label>
            <input matInput type="password" formControlName="password" placeholder="Enter your password">

            <mat-error *ngIf="form.get('password')?.hasError('required')">
              Password is required
            </mat-error>
          </mat-form-field>

          <!-- REMEMBER -->
          <div class="remember-row">
            <mat-checkbox formControlName="remember">
              Keep me logged in
            </mat-checkbox>

            <a routerLink="/authentication/forgot-password">
              Forgot password?
            </a>
          </div>

          <!-- SUBMIT -->
          <button mat-flat-button color="primary" class="login-btn" type="submit" [disabled]="form.invalid || loading">

            {{ loading ? 'Signing in…' : 'Sign In' }}
          </button>

        </form>

      </div>

    </div>

  </mat-card>

</div>

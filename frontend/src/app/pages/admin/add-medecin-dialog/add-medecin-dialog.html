<div class="dialog-container">

  <div class="dialog-header">
    <h2 class="dialog-title">
      <mat-icon class="header-icon">medical_services</mat-icon>
      Add New Doctor
    </h2>
    <p class="dialog-subtitle">Please fill in the doctor's information below</p>
  </div>

  <form [formGroup]="doctorForm" (ngSubmit)="onSubmit()" class="doctor-form">

    <!-- PHOTO -->
    <div class="form-row photo-row">
      <div class="photo-upload" (click)="fileInput.click()">

        <img *ngIf="imagePreview; else cameraIcon" [src]="imagePreview" class="photo-img" />

        <ng-template #cameraIcon>
          <mat-icon class="camera-icon">photo_camera</mat-icon>
        </ng-template>

        <input #fileInput type="file" hidden accept="image/*" (change)="onFileSelected($event)" />
      </div>
    </div>

    <!-- NAMES -->
    <div class="form-row">
      <mat-form-field appearance="outline" class="form-field">
        <mat-label>First Name</mat-label>
        <input matInput formControlName="firstName">
      </mat-form-field>

      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Last Name</mat-label>
        <input matInput formControlName="lastName">
      </mat-form-field>
    </div>

    <!-- EMAIL + PASSWORD -->
    <div class="form-row">

      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email">
      </mat-form-field>

      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Password</mat-label>

        <input matInput type="password" formControlName="password">

        <mat-icon matSuffix>lock</mat-icon>

        <mat-error *ngIf="doctorForm.get('password')?.invalid && doctorForm.get('password')?.touched">
          Password must be at least 6 characters
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Phone</mat-label>
        <input matInput formControlName="phone">
      </mat-form-field>

    </div>

    <!-- DATE + GENDER -->
    <div class="form-row">

      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Date of Birth</mat-label>

        <input matInput [matDatepicker]="picker" formControlName="dateOfBirth" readonly (click)="picker.open()">

        <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
      </mat-form-field>

      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Gender</mat-label>
        <mat-select formControlName="gender">
          <mat-option *ngFor="let g of genderOptions" [value]="g.value">
            {{ g.label }}
          </mat-option>
        </mat-select>
      </mat-form-field>

    </div>

    <!-- ADDRESS -->
    <mat-form-field appearance="outline" class="form-field full-width">
      <mat-label>Address</mat-label>
      <textarea matInput formControlName="address"></textarea>
    </mat-form-field>

    <!-- DOCTOR INFO -->
    <div class="form-row">

      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Specialty</mat-label>
        <mat-select formControlName="specialty">
          <mat-option *ngFor="let s of specialtyOptions" [value]="s">
            {{ s }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" class="form-field">
        <mat-label>License Number</mat-label>
        <input matInput formControlName="licenseNumber">
      </mat-form-field>

    </div>

    <div class="form-row">

      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Years of Experience</mat-label>
        <input matInput type="number" formControlName="yearsExperience">
      </mat-form-field>

      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Service</mat-label>
        <mat-select formControlName="serviceId">
          <mat-option *ngFor="let s of services" [value]="s._id">
            {{ s.name }}
          </mat-option>
        </mat-select>
      </mat-form-field>

    </div>

    <!-- ACTIONS -->
    <div class="dialog-actions">

      <button mat-button type="button" (click)="onCancel()">
        Cancel
      </button>

      <button mat-flat-button color="primary" type="submit" class="submit-button">
        <mat-icon>save</mat-icon>
        Add Doctor
      </button>

    </div>

  </form>
</div>

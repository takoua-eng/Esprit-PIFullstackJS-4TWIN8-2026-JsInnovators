<div class="row">
  <div class="col-lg-12">
    <mat-card class="cardWithShadow m-b-24">
      <mat-card-content class="p-24">

        <mat-card-title>
          Patients
        </mat-card-title>

        <div class="d-flex justify-content-between align-items-center m-b-16">
          <div>
            Total Patients
            <div>{{ dataSource.data.length }}</div>
          </div>

          <button mat-flat-button color="primary" (click)="addUser()">
            Add Patient
          </button>
        </div>

        <!-- 🔍 SEARCH -->
        <mat-form-field appearance="outline" class="w-100 m-b-16">
          <mat-label>Search patient</mat-label>
          <input matInput (keyup)="applyFilter($event)" placeholder="Search..." />
          <mat-icon matSuffix>search</mat-icon>
        </mat-form-field>

        <div class="table-responsive">
          <table mat-table [dataSource]="dataSource" class="w-100">

            <!-- NAME -->
            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef> Name </th>
              <td mat-cell *matCellDef="let row">
                {{ row.firstName }} {{ row.lastName }}
              </td>
            </ng-container>

            <!-- EMAIL -->
            <ng-container matColumnDef="email">
              <th mat-header-cell *matHeaderCellDef> Email </th>
              <td mat-cell *matCellDef="let row">
                {{ row.email }}
              </td>
            </ng-container>

            <!-- SERVICE -->
            <ng-container matColumnDef="service">
              <th mat-header-cell *matHeaderCellDef> Service </th>
              <td mat-cell *matCellDef="let row">
                {{ row.serviceId }}
              </td>
            </ng-container>

            <!-- STATUS -->
            <ng-container matColumnDef="status">
              <th mat-header-cell *matHeaderCellDef> Status </th>
              <td mat-cell *matCellDef="let row">
                <span class="badge bg-light-success text-success">
                  Active
                </span>
              </td>
            </ng-container>

            <!-- ACTIONS -->
            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef> Actions </th>
              <td mat-cell *matCellDef="let row">
                <button mat-icon-button color="primary" (click)="editUser(row)">
                  <mat-icon>edit</mat-icon>
                </button>
                <button mat-icon-button color="warn" (click)="deleteUser(row._id)">
                  <mat-icon>delete</mat-icon>
                </button>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

          </table>
        </div>

      </mat-card-content>
    </mat-card>
  </div>
</div>

<div class="row">
  <div class="col-lg-12">
    <mat-card class="cardWithShadow m-b-24">
      <mat-card-content class="p-24">
        <!-- HEADER -->
        <div
          class="header d-flex justify-content-between align-items-center mb-4"
        >
          <div>
            <h2 class="title mb-1">Patients</h2>
            <p class="subtitle text-muted">
              Manage all patients in your system
            </p>
          </div>
          <button mat-raised-button color="primary" (click)="addUser()"
            *ngIf="core.hasPermission('patients:create')">
            <mat-icon>add</mat-icon>
            Add Patient
          </button>
        </div>

        <!-- TOOLBAR -->
        <div
          class="toolbar d-flex justify-content-between align-items-center mb-3"
        >
          <div class="total">
            Total: <strong>{{ dataSource.data.length }}</strong>
          </div>
          <mat-form-field appearance="outline" class="search-field">
            <mat-icon matPrefix>search</mat-icon>
            <input
              matInput
              placeholder="Search patient..."
              (keyup)="applyFilter($event)"
            />
          </mat-form-field>
        </div>

        <!-- LOADING -->
        <div *ngIf="loading" class="loading text-center py-5">
          <mat-progress-spinner
            diameter="40"
            mode="indeterminate"
            color="primary"
          ></mat-progress-spinner>
          <p class="mt-3 text-muted">Loading patients...</p>
        </div>

        <!-- TABLE -->
        <div class="table-container" *ngIf="!loading">
          <table mat-table [dataSource]="dataSource" matSort>
            <!-- PHOTO (CIRCLE) -->
            <ng-container matColumnDef="photo">
              <th mat-header-cell *matHeaderCellDef class="text-center">
                Photo
              </th>
              <td mat-cell *matCellDef="let row" class="text-center">
                <div class="avatar-circle">
                  <img
                    *ngIf="row.photo"
                    [src]="row.photo"
                    [alt]="row.name"
                    (error)="onImageError($event)"
                  />
                  <span *ngIf="!row.photo" class="avatar-initials">
                    {{ getInitials(row.name) }}
                  </span>
                </div>
              </td>
            </ng-container>

            <!-- NAME -->
            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
              <td mat-cell *matCellDef="let row">
                <div class="patient-name">{{ row.name }}</div>
                <div class="patient-email">{{ row.email }}</div>
              </td>
            </ng-container>

            <!-- PHONE -->
            <ng-container matColumnDef="phone">
              <th mat-header-cell *matHeaderCellDef mat-sort-header>Phone</th>
              <td mat-cell *matCellDef="let row">
                <span class="phone-text">{{ row.phone }}</span>
              </td>
            </ng-container>

            <!-- GENDER -->
            <ng-container matColumnDef="gender">
              <th mat-header-cell *matHeaderCellDef>Gender</th>
              <td mat-cell *matCellDef="let row">
                <span class="gender-badge" [ngClass]="row.gender.toLowerCase()">
                  {{ row.gender }}
                </span>
              </td>
            </ng-container>

            <!-- STATUS -->
            <ng-container matColumnDef="status">
              <th mat-header-cell *matHeaderCellDef>Status</th>
              <td mat-cell *matCellDef="let row">
                <span
                  class="status-badge"
                  [ngClass]="row.isActive ? 'active' : 'inactive'"
                >
                  {{ row.isActive ? 'Active' : 'Inactive' }}
                </span>
              </td>
            </ng-container>

            <!-- ACTIONS -->
            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef class="text-center">
                Actions
              </th>
              <td mat-cell *matCellDef="let row" class="text-center">
                <div class="actions">
                  <mat-slide-toggle
                    [checked]="row.isActive"
                    (click)="$event.preventDefault(); toggleStatus(row)"
                    color="primary"
                    *ngIf="core.hasPermission('patients:update')"
                  ></mat-slide-toggle>
                  <button mat-icon-button color="warn" (click)="deletePatient(row)"
                    *ngIf="core.hasPermission('patients:delete')">
                    <mat-icon>delete</mat-icon>
                  </button>
                </div>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          </table>

          <mat-paginator
            [pageSizeOptions]="[5, 10, 25]"
            showFirstLastButtons
          ></mat-paginator>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>

<div class="row">
  <div class="col-lg-12">
    <mat-card class="cardWithShadow m-b-24">
      <mat-card-content class="p-24">

        <!-- HEADER -->
        <div class="header d-flex justify-content-between align-items-center mb-4">
          <div>
            <h2 class="title mb-1">Roles</h2>
            <p class="subtitle text-muted">Manage all roles in your system</p>
          </div>
          <button mat-raised-button color="primary" (click)="openAddDialog()">
            <mat-icon>add</mat-icon>
            Add Role
          </button>
        </div>

        <!-- TOOLBAR -->
        <div class="toolbar d-flex justify-content-between align-items-center mb-3">
          <div class="total">
            Total: <strong>{{ dataSource.data.length }}</strong>
          </div>
          <mat-form-field appearance="outline" class="search-field">
            <mat-icon matPrefix>search</mat-icon>
            <input matInput placeholder="Search roles..." (keyup)="applyFilter($event)" />
          </mat-form-field>
        </div>

        <!-- TABLE -->
        <div class="table-container">
          <table mat-table [dataSource]="dataSource" matSort>

            <!-- NAME -->
            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
              <td mat-cell *matCellDef="let row">
                <div class="patient-name">{{ row.name }}</div>
              </td>
            </ng-container>

            <!-- DESCRIPTION -->
            <ng-container matColumnDef="description">
              <th mat-header-cell *matHeaderCellDef>Description</th>
              <td mat-cell *matCellDef="let row">{{ row.description }}</td>
            </ng-container>

            <!-- USERS COUNT -->
            <ng-container matColumnDef="usersCount">
              <th mat-header-cell *matHeaderCellDef mat-sort-header>Users</th>
              <td mat-cell *matCellDef="let row">
                <span class="phone-text">{{ row.usersCount }}</span>
              </td>
            </ng-container>

            <!-- ACTIONS -->
            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef class="text-center">Actions</th>
              <td mat-cell *matCellDef="let row" class="text-center">
                <div class="actions">
                  <button mat-icon-button color="primary" (click)="openEditDialog(row)" matTooltip="Edit">
                    <mat-icon>edit</mat-icon>
                  </button>
                  <button mat-icon-button color="warn" (click)="archiveRole(row)" matTooltip="Archive">
                    <mat-icon>archive</mat-icon>
                  </button>
                </div>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
          </table>

          <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
        </div>

      </mat-card-content>
    </mat-card>
  </div>
</div>

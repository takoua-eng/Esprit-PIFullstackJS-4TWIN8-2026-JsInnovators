<!-- Top KPI cards -->
<div class="row m-b-24">
  <div class="col-md-3 m-b-16">
    <mat-card
      class="cardWithShadow"
      style="background-color: #6c5ce7; color: #fff; border-radius: 18px"
    >
      <mat-card-content class="p-16">
        <i-tabler name="users-group" class="icon-24 d-block m-b-8"></i-tabler>
        <div class="f-w-700 f-s-22 m-b-4">120</div>
        <div class="f-s-14 f-w-600 m-b-2">Patients</div>
        <div class="f-s-12" style="opacity: 0.85">All registered patients</div>
      </mat-card-content>
    </mat-card>
  </div>

  <div class="col-md-3 m-b-16">
    <mat-card
      class="cardWithShadow"
      style="background-color: #0984e3; color: #fff; border-radius: 18px"
    >
      <mat-card-content class="p-16">
        <i-tabler name="stethoscope" class="icon-24 d-block m-b-8"></i-tabler>
        <div class="f-w-700 f-s-22 m-b-4">45</div>
        <div class="f-s-14 f-w-600 m-b-2">Doctors</div>
        <div class="f-s-12" style="opacity: 0.85">All specialists</div>
      </mat-card-content>
    </mat-card>
  </div>

  <div class="col-md-3 m-b-16">
    <mat-card
      class="cardWithShadow"
      style="background-color: #fdcb6e; color: #fff; border-radius: 18px"
    >
      <mat-card-content class="p-16">
        <i-tabler name="nurse" class="icon-24 d-block m-b-8"></i-tabler>
        <div class="f-w-700 f-s-22 m-b-4">30</div>
        <div class="f-s-14 f-w-600 m-b-2">Nurses</div>
        <div class="f-s-12" style="opacity: 0.9">Medical staff</div>
      </mat-card-content>
    </mat-card>
  </div>

  <div class="col-md-3 m-b-16">
    <mat-card
      class="cardWithShadow"
      style="background-color: #e17055; color: #fff; border-radius: 18px"
    >
      <mat-card-content class="p-16">
        <i-tabler name="shield-lock" class="icon-24 d-block m-b-8"></i-tabler>
        <div class="f-w-700 f-s-22 m-b-4">10</div>
        <div class="f-s-14 f-w-600 m-b-2">Admins</div>
        <div class="f-s-12" style="opacity: 0.9">System administrators</div>
      </mat-card-content>
    </mat-card>
  </div>
</div>

<!-- Super Admin Dashboard -->
<div class="row">
  <div class="col-12">
    <mat-card class="cardWithShadow">
      <mat-card-content>
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <mat-card-title>Super Admin Dashboard</mat-card-title>
            <mat-card-subtitle class="f-s-13 text-muted">
              Global platform analytics
            </mat-card-subtitle>
          </div>

          <div class="btn-group">
            <button
              mat-stroked-button
              class="m-r-4"
              [ngClass]="{ 'bg-primary text-white': viewMode === 'day' }"
              (click)="viewMode = 'day'"
            >
              Day
            </button>

            <button
              mat-stroked-button
              class="m-r-4"
              [ngClass]="{ 'bg-primary text-white': viewMode === 'month' }"
              (click)="viewMode = 'month'"
            >
              Month
            </button>

            <button
              mat-stroked-button
              [ngClass]="{ 'bg-primary text-white': viewMode === 'year' }"
              (click)="viewMode = 'year'"
            >
              Year
            </button>
          </div>
        </div>

        <div class="m-t-16">
          <app-profit-expenses [mode]="viewMode"></app-profit-expenses>
        </div>

        <!-- Metrics -->
        <div class="row m-t-16">
          <div class="col-md-2 m-b-8">
            <div class="f-s-12 text-muted">Total Visits</div>
            <div class="f-w-600 f-s-14">50,000 sessions</div>
          </div>
          <div class="col-md-2 m-b-8">
            <div class="f-s-12 text-muted">Users</div>
            <div class="f-w-600 f-s-14">35,000 users</div>
          </div>
          <div class="col-md-2 m-b-8">
            <div class="f-s-12 text-muted">Page Views</div>
            <div class="f-w-600 f-s-14">120,000 views</div>
          </div>
          <div class="col-md-2 m-b-8">
            <div class="f-s-12 text-muted">New Patients</div>
            <div class="f-w-600 f-s-14">10,000 patients</div>
          </div>
          <div class="col-md-2 m-b-8">
            <div class="f-s-12 text-muted">Growth Rate</div>
            <div class="f-w-600 f-s-14">+45%</div>
          </div>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>

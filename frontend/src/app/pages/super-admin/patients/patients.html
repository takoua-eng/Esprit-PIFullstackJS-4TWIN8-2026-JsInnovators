<!-- HEADER -->
<div class="header d-flex justify-content-between align-items-center mb-4">
  <div>
    <h2 class="title mb-1">Patients</h2>
    <p class="subtitle text-muted">Manage all patients in your system</p>
  </div>
  <button mat-raised-button color="primary" (click)="addUser()" *ngIf="core.hasPermission('patients:create')">
    <mat-icon>add</mat-icon>
    Add Patient
  </button>
</div>

<!-- TABLE -->
<table mat-table [dataSource]="dataSource" matSort>

  <!-- PHOTO -->
  <ng-container matColumnDef="photo">
    <th mat-header-cell *matHeaderCellDef>Photo</th>
    <td mat-cell *matCellDef="let row">
      <div class="avatar-circle">
        <img *ngIf="row.photo" [src]="row.photo" [alt]="row.name" (error)="onImageError($event)" />
        <span *ngIf="!row.photo" class="avatar-initials">{{ getInitials(row.name) }}</span>
      </div>
    </td>
  </ng-container>

  <!-- NAME -->
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
    <td mat-cell *matCellDef="let row">{{ row.name }}</td>
  </ng-container>

  <!-- PHONE -->
  <ng-container matColumnDef="phone">
    <th mat-header-cell *matHeaderCellDef>Phone</th>
    <td mat-cell *matCellDef="let row">{{ row.phone }}</td>
  </ng-container>

  <!-- GENDER -->
  <ng-container matColumnDef="gender">
    <th mat-header-cell *matHeaderCellDef>Gender</th>
    <td mat-cell *matCellDef="let row">{{ row.gender }}</td>
  </ng-container>

  <!-- STATUS -->
  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Status</th>
    <td mat-cell *matCellDef="let row">
      <mat-slide-toggle *ngIf="core.hasPermission('patients:update')"
        [checked]="row.isActive"
        (click)="$event.preventDefault(); toggleStatus(row)">
      </mat-slide-toggle>
      <span *ngIf="!core.hasPermission('patients:update')">
        {{ row.isActive ? 'Active' : 'Inactive' }}
      </span>
    </td>
  </ng-container>

  <!-- ACTIONS -->
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Actions</th>
    <td mat-cell *matCellDef="let row">
      <button mat-icon-button color="warn" (click)="deletePatient(row)" *ngIf="core.hasPermission('patients:delete')">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>

<mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons></mat-paginator>

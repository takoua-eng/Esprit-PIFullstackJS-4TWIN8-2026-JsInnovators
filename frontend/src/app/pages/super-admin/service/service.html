<div class="row">
  <div class="col-lg-12">
    <mat-card class="cardWithShadow m-b-24">
      <mat-card-content class="p-24">
        <!-- HEADER -->
        <div
          class="header d-flex justify-content-between align-items-center mb-4"
        >
          <div>
            <h2 class="title mb-1">Services</h2>
            <p class="subtitle text-muted">
              Manage all services in your system
            </p>
          </div>

          <button mat-raised-button color="primary" (click)="addService()">
            <mat-icon>add</mat-icon>
            Add Service
          </button>
        </div>

        <!-- TOOLBAR -->
        <div
          class="toolbar d-flex justify-content-between align-items-center mb-3"
        >
          <div class="total">
            Total: <strong>{{ dataSource.data.length }}</strong>
          </div>

          <mat-form-field appearance="outline" class="search-field">
            <mat-icon matPrefix>search</mat-icon>
            <input
              matInput
              placeholder="Search service..."
              (keyup)="applyFilter($event)"
            />
          </mat-form-field>
        </div>

        <!-- LOADING -->
        <div *ngIf="loading" class="loading text-center py-5">
          <mat-progress-spinner
            diameter="40"
            mode="indeterminate"
          ></mat-progress-spinner>
          <p class="mt-3 text-muted">Loading services...</p>
        </div>

        <!-- TABLE -->
        <div class="table-container" *ngIf="!loading">
          <table mat-table [dataSource]="dataSource" matSort>
            <!-- NAME -->
            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
              <td mat-cell *matCellDef="let row">
                <div class="patient-name">{{ row.name }}</div>
              </td>
            </ng-container>

            <!-- CODE -->
            <ng-container matColumnDef="code">
              <th mat-header-cell *matHeaderCellDef mat-sort-header>Code</th>
              <td mat-cell *matCellDef="let row">
                <span class="phone-text">{{ row.code }}</span>
              </td>
            </ng-container>

            <!-- DESCRIPTION -->
            <ng-container matColumnDef="description">
              <th mat-header-cell *matHeaderCellDef>Description</th>
              <td mat-cell *matCellDef="let row">{{ row.description }}</td>
            </ng-container>

            <!-- STATUS -->
            <ng-container matColumnDef="status">
              <th mat-header-cell *matHeaderCellDef>Status</th>
              <td mat-cell *matCellDef="let row">
                <span
                  class="status-badge"
                  [ngClass]="row.isActive ? 'active' : 'inactive'"
                >
                  {{ row.isActive ? 'Active' : 'Inactive' }}
                </span>
              </td>
            </ng-container>

            <!-- ACTIONS -->
            <!-- ACTIONS -->
            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef class="text-center">
                Actions
              </th>
              <td mat-cell *matCellDef="let row" class="text-center">
                <div class="actions">
                  <!-- VIEW BUTTON -->
                  <button mat-icon-button color="accent" (click)="viewService(row)" matTooltip="View">
                    <mat-icon>visibility</mat-icon>
                  </button>

                  <!-- EDIT BUTTON -->
                  <button mat-icon-button color="primary" (click)="editService(row)">
                    <mat-icon>edit</mat-icon>
                  </button>

                  <mat-slide-toggle
                    [checked]="row.isActive"
                    (click)="$event.preventDefault(); toggleStatus(row)"
                  ></mat-slide-toggle>

                  <button
                    mat-icon-button
                    color="warn"
                    (click)="deleteService(row)"
                  >
                    <mat-icon>delete</mat-icon>
                  </button>
                </div>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          </table>

          <mat-paginator
            [pageSizeOptions]="[5, 10, 25]"
            showFirstLastButtons
          ></mat-paginator>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>

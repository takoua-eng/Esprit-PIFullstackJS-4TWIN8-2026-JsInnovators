<!-- src/app/pages/super-admin/super-header/super-header.component.html -->
<mat-toolbar class="topbar gap-10">
  <!-- ✅ Mobile Menu -->
  @if (showToggle) {
  <button
    mat-icon-button
    (click)="toggleMobileNav.emit()"
    class="d-flex d-md-none justify-content-center"
  >
    <i-tabler name="menu-2" class="icon-20 d-flex"></i-tabler>
  </button>
  }

  <!-- ✅ شعار Super Admin المميز -->
  <div class="branding d-flex align-items-center m-l-8">
    <span class="f-w-700 f-s-16 text-primary">
      <i-tabler name="shield-lock" class="icon-20 m-r-4"></i-tabler>
      SuperAdmin
    </span>
  </div>

  <!-- ✅ إشعارات خاصة بالـ Super Admin -->
  <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Notifications">
    <i-tabler
      class="d-flex"
      name="bell"
      matBadge="3"
      matBadgeColor="warn"
    ></i-tabler>
  </button>
  <mat-menu #menu="matMenu" xPosition="before">
    <div class="px-4 py-2">
      <div class="f-w-600 m-b-8">Notifications</div>
      <mat-divider></mat-divider>
    </div>
    <!-- ✅ إشعارات خاصة بالـ Super Admin -->
    <button mat-menu-item>
      <i-tabler
        name="shield-check"
        class="icon-16 text-success m-r-8"
      ></i-tabler>
      <span>Nouvel admin créé</span>
    </button>
    <button mat-menu-item>
      <i-tabler
        name="alert-triangle"
        class="icon-16 text-warning m-r-8"
      ></i-tabler>
      <span>Alerte sécurité détectée</span>
    </button>
    <button mat-menu-item>
      <i-tabler name="users" class="icon-16 text-primary m-r-8"></i-tabler>
      <span>10 nouveaux patients aujourd'hui</span>
    </button>
  </mat-menu>

  <span class="flex-1-auto"></span>

  <!-- ✅ حالة النظام (حصري للـ Super Admin) -->
  <div
    class="d-none d-md-flex align-items-center gap-8 p-x-12 p-y-8 rounded-pill bg-light-success text-success f-s-12 f-w-600 m-r-8"
  >
    <span
      style="width: 8px; height: 8px; border-radius: 50%; background: #00b894"
    ></span>
    Système Opérationnel
  </div>

  <!-- ✅ profile menu -->
  <button
    mat-icon-button
    [matMenuTriggerFor]="profileMenu"
    aria-label="User menu"
  >
    <img
      src="/assets/images/profile/user-1.jpg"
      class="rounded-circle object-cover d-block"
      width="35"
    />
  </button>

  <mat-menu #profileMenu="matMenu" xPosition="before">
    <div class="px-4 py-3">
      <div class="f-w-700 f-s-15">{{ 'APP_NAME' | translate }}</div>
      <!-- ✅ عرض دور Super Admin -->
      <div class="text-muted f-s-12">
        <!-- ✅ التصحيح: </i-tabler> وليس </i-table> -->
        <i-tabler name="shield-check" class="icon-12 m-r-4"></i-tabler>
        Super Administrator
      </div>
    </div>
    <mat-divider></mat-divider>

    <!-- ✅ روابط خاصة بالـ Super Admin -->
    <button mat-menu-item (click)="goToProfile()">
      <i-tabler name="user" class="icon-16"></i-tabler>
      <span>{{ 'PROFILE' | translate }}</span>
    </button>
    <button mat-menu-item routerLink="/super-admin/settings">
      <i-tabler name="settings" class="icon-16"></i-tabler>
      <span>Paramètres</span>
    </button>
    <button mat-menu-item routerLink="/super-admin/admin-users">
      <i-tabler name="users" class="icon-16"></i-tabler>
      <span>Gestion des Admins</span>
    </button>
    <mat-divider></mat-divider>
    <button mat-menu-item (click)="logout()" class="text-error">
      <i-tabler name="logout" class="icon-16"></i-tabler>
      <span>{{ 'LOGOUT' | translate }}</span>
    </button>
  </mat-menu>
</mat-toolbar>

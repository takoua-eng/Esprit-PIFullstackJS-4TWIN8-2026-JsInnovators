<div class="row">
  <div class="col-lg-12">
    <mat-card>
      <mat-card-content>
        <!-- SEARCH + ADD -->
        <div class="d-flex justify-content-between mb-3">
          <mat-form-field appearance="outline" class="search-field">
            <mat-label>Search patient...</mat-label>
            <input matInput (keyup)="applyFilter($event)" />
            <mat-icon matPrefix>search</mat-icon>
          </mat-form-field>

          <!-- ADD BUTTON -->
          <button
            mat-raised-button
            color="primary"
            (click)="addAdmin()"
            *ngIf="core.hasPermission('users:create')"
          >
            <mat-icon>add</mat-icon> Add Admin
          </button>
        </div>

        <!-- TABLE -->
        <div class="table-container">
          <table mat-table [dataSource]="dataSource" matSort>
            <!-- PHOTO -->
            <ng-container matColumnDef="photo">
              <th mat-header-cell *matHeaderCellDef class="text-center">
                Photo
              </th>
              <td mat-cell *matCellDef="let admin" class="text-center">
                <div class="avatar-circle">
                  <img
                    *ngIf="admin.photo && admin.photo !== ''"
                    [src]="admin.photo"
                    [alt]="getFullName(admin)"
                    (error)="onImageError($event)"
                  />
                  <span
                    *ngIf="!admin.photo || admin.photo === ''"
                    class="avatar-initials"
                  >
                    {{ getInitials(getFullName(admin)) }}
                  </span>
                </div>
              </td>
            </ng-container>

            <!-- NAME -->
            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
              <td mat-cell *matCellDef="let admin">
                <div class="admin-name">{{ getFullName(admin) }}</div>
                <div class="admin-email">{{ admin.email }}</div>
              </td>
            </ng-container>

            <!-- PHONE -->
            <ng-container matColumnDef="phone">
              <th mat-header-cell *matHeaderCellDef mat-sort-header>Phone</th>
              <td mat-cell *matCellDef="let admin">{{ admin.phone || '-' }}</td>
            </ng-container>

            <!-- GENDER -->
            <ng-container matColumnDef="gender">
              <th mat-header-cell *matHeaderCellDef mat-sort-header>Gender</th>
              <td mat-cell *matCellDef="let admin">
                <span
                  class="gender-badge"
                  [class.male]="admin.gender === 'male'"
                  [class.female]="admin.gender === 'female'"
                >
                  {{ admin.gender || '-' }}
                </span>
              </td>
            </ng-container>

            <!-- STATUS -->
            <ng-container matColumnDef="status">
              <th mat-header-cell *matHeaderCellDef>Status</th>
              <td mat-cell *matCellDef="let admin">
                <span
                  class="status-badge"
                  [class.active]="admin.isActive"
                  [class.inactive]="!admin.isActive"
                >
                  <span class="status-dot"></span>
                  {{ admin.isActive ? 'Active' : 'Inactive' }}
                </span>
              </td>
            </ng-container>

            <!-- ACTIONS -->
            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef>Actions</th>
              <td mat-cell *matCellDef="let admin">
                <div class="actions">
                  <!-- TOGGLE -->
                  <mat-slide-toggle
                    *ngIf="core.hasPermission('users:update')"
                    [checked]="admin.isActive"
                    (change)="toggleStatus(admin)"
                    color="primary"
                    matTooltip="{{ admin.isActive ? 'Deactivate' : 'Activate' }}"
                  ></mat-slide-toggle>

                  <!-- EDIT -->
                  <button
                    mat-icon-button color="primary"
                    (click)="editAdmin(admin)" matTooltip="Edit"
                    *ngIf="core.hasPermission('users:update')"
                  >
                    <mat-icon>edit</mat-icon>
                  </button>

                  <!-- DELETE -->
                  <button
                    mat-icon-button color="warn"
                    (click)="archiveAdmin(admin)" matTooltip="Delete"
                    *ngIf="core.hasPermission('users:delete')"
                  >
                    <mat-icon>delete</mat-icon>
                  </button>
                </div>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
          </table>
        </div>

        <mat-paginator
          [pageSizeOptions]="[5, 10, 25]"
          showFirstLastButtons
        ></mat-paginator>
      </mat-card-content>
    </mat-card>
  </div>
</div>

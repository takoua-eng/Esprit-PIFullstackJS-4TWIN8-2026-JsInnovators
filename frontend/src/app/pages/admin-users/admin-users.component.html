<div class="row">
  <div class="col-lg-12">
    <mat-card class="cardWithShadow m-b-24">
      <mat-card-content class="p-24">
        <mat-card-title class="f-w-600 m-b-4">
          {{ title }}
        </mat-card-title>
        <mat-card-subtitle class="f-s-13 text-muted m-b-16">
          Manage {{ title.toLowerCase() }} accounts for MediFollow.
        </mat-card-subtitle>
        <div class="d-flex justify-content-between align-items-center m-b-16 flex-wrap gap-2">
          <div>
            <span class="f-s-14 text-muted">Total {{ title.toLowerCase() }}</span>
            <div class="f-w-600">{{ users.length }}</div>
          </div>
          <button mat-flat-button color="primary" (click)="addUser()">
            Add new {{ title | lowercase | slice:0:-1 }}
          </button>
        </div>

        <div class="table-responsive">
          <table mat-table [dataSource]="users" class="w-100">
            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef> Name </th>
              <td mat-cell *matCellDef="let row"> {{ row.name }} </td>
            </ng-container>

            <ng-container matColumnDef="email">
              <th mat-header-cell *matHeaderCellDef> Email </th>
              <td mat-cell *matCellDef="let row"> {{ row.email }} </td>
            </ng-container>

            <ng-container matColumnDef="service">
              <th mat-header-cell *matHeaderCellDef> Service / Unit </th>
              <td mat-cell *matCellDef="let row"> {{ row.service }} </td>
            </ng-container>

            <ng-container matColumnDef="status">
              <th mat-header-cell *matHeaderCellDef> Status </th>
              <td mat-cell *matCellDef="let row">
                <span
                  class="badge"
                  [ngClass]="row.status === 'Active' ? 'bg-light-success text-success' : 'bg-light-warning text-warning'"
                >
                  {{ row.status }}
                </span>
              </td>
            </ng-container>

            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef class="text-end"> Actions </th>
              <td mat-cell *matCellDef="let row" class="text-end">
                <button mat-icon-button color="primary" matTooltip="Edit">
                  <mat-icon>edit</mat-icon>
                </button>
                <button mat-icon-button color="warn" matTooltip="Deactivate">
                  <mat-icon>person_off</mat-icon>
                </button>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
          </table>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
